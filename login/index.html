<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaQueries.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Entrar</h1>
                <p>Faça login na sua conta para usar todos os recursos do site</p>
                <form action="login.php" method="post">
                    <label for="email">email</label>
                    <input type="email" name="email" id="email" required placeholder="exemplo@email.com" autocomplete="email">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" required minlength="8" maxlength="15" autocomplete="current-password">

                    <a href="#">Esqueceu a senha</a>
                    <button type="submit">Entrar</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
