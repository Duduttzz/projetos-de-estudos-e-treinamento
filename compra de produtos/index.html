<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/pages/index/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <title>Document</title>
</head>
<body>
  <header>

    <div class="texts-header">
      <h1>Checkout</h1>
      <span class="item-count">3 items</span>
    </div>

  </header>

  <main>
    <div class="container-main">

      <section class="container-items">

        <ul class="carrinho-list">
          <li>
            <article class="carrinho-item">
        
              <div class="img-item"><img src="assets/images/Gold.png" alt="Imagem do Iphone 12 pro"></div>
              <div class="infos-item">
                <p class="nome-item">iphone 12 Pro</p>
                <p class="cor-item">Golden</p>
                <p class="quant-item ">x 1</p>
              </div>
              <div class="price">
                <p class="valor-item">$999.00</p>
              </div>
                <button class="remover-btn"><img src="assets/images/close-icon.svg" alt="icone de remover"></button>
            </article>
          </li>
          <li>
            <article class="carrinho-item">
              <div class="img-item"><img src="assets/images/Apple-watch.png" alt="" class="img-item"></div>
              <div class="infos-item">
                <p class="nome-item">Apple Watch</p>
                <p class="cor-item">Blue</p>
                <p class="quant-item">x 1</p>
              </div>
              <div class="price">
                <p class="valor-item">$399.00</p>
              </div>
              <button class="remover-btn"><img src="assets/images/close-icon.svg" alt=""></button>
            </article>
          </li>
          <li>
            <article class="carrinho-item">
              <div class="img-item"><img src="assets/images/iMac.png" alt=""></div>
              <div class="infos-item">
                <p class="nome-item">IMac</p>
                <p class="cor-item">Green</p>
                <p class="quant-item">x 1</p>
              </div>
              <div class="price">
                <p class="valor-item">$1199.00</p>
              </div>
              <button class="remover-btn"><img src="assets/images/close-icon.svg" alt=""></button>
            </article>
          </li>
        </ul>
        
        <hr>
        
        <form action="#" class="container-cupom">
          <input type="text" name="cupom" id="icupom" placeholder="Enter coupon code">
          <button type="submit" class="btn-primario">Apply Coupon</button>
        </form>
        
        <div class="valores-pagar">
          <div>
            <p>Sub Total</p>
            <p>Tax</p>
            <p>Total</p>
          </div>
          <div class="valores">
            <p>$2597.00</p>
            <p>$623.28</p>
            <p>$3220.28</p>
          </div>
        
        </div>

      </section>

      <section class="container-contact">

        <h2>Contact Information</h2>

        <form action="#" class="contact-infos">

          <div class="Field">
            <label for="idname">First & Last name</label>
            <input type="text" name="name" id="idname" placeholder="Enter first & last name" required>
          </div>

          <div class="Field">
            <label for="iemail">Email Address</label>
            <input type="email" name="email" id="iemail" placeholder="Enter Email address" required>
          </div>

          <div class="container-country">

            <div class="Field">
              <label for="Country-list">Country</label>
              <select id="Country-list">
                <option value="BR">Brasil</option>
                <option value="US">Estados Unidos</option>
                <option value="CA">Canadá</option>
                <option value="MX">México</option>
                <option value="AR">Argentina</option>
                <option value="CL">Chile</option>
                <option value="CO">Colômbia</option>
                <option value="PE">Peru</option>
                <option value="PT">Portugal</option>
                <option value="ES">Espanha</option>
                <option value="FR">França</option>
                <option value="DE">Alemanha</option>
                <option value="IT">Itália</option>
                <option value="NL">Países Baixos</option>
                <option value="BE">Bélgica</option>
                <option value="CH">Suíça</option>
                <option value="GB">Reino Unido</option>
                <option value="IE">Irlanda</option>
                <option value="NO">Noruega</option>
                <option value="SE">Suécia</option>
                <option value="DK">Dinamarca</option>
                <option value="FI">Finlândia</option>
                <option value="PL">Polônia</option>
                <option value="GR">Grécia</option>
                <option value="RU">Rússia</option>
                <option value="TR">Turquia</option>
                <option value="CN">China</option>
                <option value="JP">Japão</option>
                <option value="KR">Coreia do Sul</option>
                <option value="IN">Índia</option>
                <option value="AU">Austrália</option>
                <option value="NZ">Nova Zelândia</option>
                <option value="ZA">África do Sul</option>
                <option value="EG">Egito</option>
                <option value="NG">Nigéria</option>
                <option value="KE">Quênia</option>
                <option value="AE">Emirados Árabes Unidos</option>
                <option value="SA">Arábia Saudita</option>
                <option value="IL">Israel</option>
                <option value="TH">Tailândia</option>
                <option value="SG">Singapura</option>
                <option value="MY">Malásia</option>
                <option value="ID">Indonésia</option>
                <option value="PH">Filipinas</option>
              </select>
            </div>

            <div class="Field">
              <label for="iPostal">Postal Code</label>
              <input type="text" name="Postal-code" id="iPostal" placeholder="00270" required>
            </div>

          </div>

          <button type="submit" class="btn-primario">Continue</button>
        </form>


      </section>

    </div>

  </main>

</body>
</html>
